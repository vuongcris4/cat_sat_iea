{% load static %}
<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Cắt sắt IEA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'styles/styles.css' %}?v=2.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #fafafa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: #ffffff;
            border: 1px solid #e5e5e5;
            border-radius: 8px;
            padding: 2.5rem;
            width: 100%;
            max-width: 360px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-header img {
            width: 48px;
            height: 48px;
            object-fit: contain;
            margin-bottom: 1.25rem;
            border-radius: 8px;
        }

        .login-header h1 {
            color: #111;
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.375rem;
            letter-spacing: -0.02em;
        }

        .login-header p {
            color: #666;
            font-size: 0.875rem;
            font-weight: 400;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            font-size: 0.8125rem;
            font-weight: 500;
            color: #333;
            margin-bottom: 0.5rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.625rem 0.75rem;
            font-size: 0.875rem;
            font-family: inherit;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            background: #fff;
            color: #111;
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #111;
            box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.05);
        }

        .form-group input::placeholder {
            color: #9ca3af;
        }

        .btn-login {
            width: 100%;
            padding: 0.625rem 1rem;
            margin-top: 0.5rem;
            font-size: 0.875rem;
            font-weight: 500;
            font-family: inherit;
            background: #111;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.15s ease;
        }

        .btn-login:hover {
            background: #333;
        }

        .btn-login:active {
            background: #000;
        }

        .alert-danger {
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 6px;
            color: #dc2626;
            padding: 0.75rem 1rem;
            margin-bottom: 1.25rem;
            font-size: 0.8125rem;
        }

        .footer-text {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid #e5e5e5;
            color: #9ca3af;
            font-size: 0.75rem;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="login-header">
            <img src="{% static 'images/logo.jpeg' %}" alt="IEA Logo">
            <h1>Cắt sắt IEA</h1>
            <p>Đăng nhập để tiếp tục</p>
        </div>

        {% if form.errors %}
        <div class="alert alert-danger" role="alert">
            <strong>Lỗi!</strong> Tên đăng nhập hoặc mật khẩu không đúng.
        </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="username">Tên đăng nhập</label>
                <input type="text" id="username" name="username" placeholder="Nhập tên đăng nhập" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Mật khẩu</label>
                <input type="password" id="password" name="password" placeholder="Nhập mật khẩu" required>
            </div>
            <button type="submit" class="btn-login">
                Đăng nhập
            </button>
        </form>

        <p class="footer-text">
            © 2026 IEA - Hệ thống tối ưu cắt sắt
        </p>
    </div>
</body>

</html>
