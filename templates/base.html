<!DOCTYPE html>
{% load static %}
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Cắt sắt IEA</title>
    <link rel="stylesheet" href="{% static 'styles/styles.css' %}?v=2.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/handsontable/dist/handsontable.full.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/handsontable/dist/handsontable.full.min.css" rel="stylesheet">
</head>

<body>
    <header class="container-fluid bg-light py-2">
        <div class="row align-items-center">
            <div class="col-auto d-flex align-items-center">
                <img src="{% static 'images/logo.jpeg' %}" alt="IEA Logo" style="height: 40px; margin-right: 10px;">
                <h1 class="h5 m-0">Cắt sắt IEA</h1>
            </div>

            <div class="col d-flex justify-content-end align-items-center">
                <nav class="nav">
                    <a class="nav-link {% if request.path == '/cat_sat/' %}active{% endif %}"
                        href="{% url 'cat_sat:index' %}">MCTĐ</a>
                    <!-- <a class="nav-link {% if request.path == '/cat_laser/' %}active{% endif %}"
                        href="{% url 'cat_laser:index' %}">MC Laser</a> -->
                    <a class="nav-link {% if request.path == '/cat_laser_roi/' %}active{% endif %}"
                        href="{% url 'cat_laser_roi:index' %}">MC Laser</a>
                </nav>

                {% if user.is_authenticated %}
                <div class="user-menu ms-4 d-flex align-items-center">
                    <span class="text-muted me-2">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                            class="bi bi-person-circle" viewBox="0 0 16 16">
                            <path d="M11 6a3 3 0 1 1-6 0 3 3 0 0 1 6 0z" />
                            <path fill-rule="evenodd"
                                d="M0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8zm8-7a7 7 0 0 0-5.468 11.37C3.242 11.226 4.805 10 8 10s4.757 1.225 5.468 2.37A7 7 0 0 0 8 1z" />
                        </svg>
                        {{ user.username }}
                    </span>
                    <a href="{% url 'accounts:logout' %}" class="btn btn-outline-secondary btn-sm">Đăng xuất</a>
                </div>
                {% endif %}
            </div>
        </div>
    </header>


    <main class="container mt-4">
        {% block content %}{% endblock %}
    </main>
</body>

</html>
