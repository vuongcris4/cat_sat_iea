{% load static %}
<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Cắt sắt IEA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #fafafa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: #fff;
            border: 1px solid #e5e5e5;
            border-radius: 8px;
            padding: 2.5rem;
            width: 100%;
            max-width: 360px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-header img {
            width: 48px;
            height: 48px;
            object-fit: contain;
            margin-bottom: 1.25rem;
            border-radius: 8px;
        }

        .login-header h1 {
            color: #111;
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.375rem;
        }

        .login-header p {
            color: #666;
            font-size: 0.875rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            font-size: 0.8125rem;
            font-weight: 500;
            color: #333;
            margin-bottom: 0.5rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.625rem 0.75rem;
            font-size: 0.875rem;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            background: #fff;
            color: #111;
            transition: border-color 0.15s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #111;
        }

        .btn-login {
            width: 100%;
            padding: 0.625rem 1rem;
            margin-top: 0.5rem;
            font-size: 0.875rem;
            font-weight: 500;
            background: #111;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .btn-login:hover {
            background: #333;
        }

        .alert-danger {
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 6px;
            color: #dc2626;
            padding: 0.75rem 1rem;
            margin-bottom: 1.25rem;
            font-size: 0.8125rem;
        }

        .footer-text {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid #e5e5e5;
            color: #9ca3af;
            font-size: 0.75rem;
        }

        /* Minimal OTP Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-box {
            background: #fff;
            border-radius: 12px;
            padding: 2rem;
            width: 90%;
            max-width: 320px;
            text-align: center;
        }

        .modal-box h2 {
            font-size: 1.125rem;
            font-weight: 600;
            color: #111;
            margin-bottom: 0.5rem;
        }

        .modal-box p {
            font-size: 0.8125rem;
            color: #666;
            margin-bottom: 1.25rem;
        }

        .modal-box .otp-input {
            width: 100%;
            text-align: center;
            font-size: 1.5rem;
            letter-spacing: 0.25em;
            font-weight: 600;
            padding: 0.75rem;
            margin-bottom: 0.5rem;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            background: #fff;
            color: #111;
        }

        .modal-box .otp-input:focus {
            outline: none;
            border-color: #111;
        }

        .modal-box .otp-error {
            color: #dc2626;
            font-size: 0.75rem;
            min-height: 1rem;
        }

        .modal-box .btn-verify {
            width: 100%;
            padding: 0.625rem;
            font-size: 0.875rem;
            font-weight: 500;
            background: #111;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 0.75rem;
        }

        .modal-box .btn-verify:hover {
            background: #333;
        }

        .modal-box .btn-verify:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }

        .modal-box .btn-cancel {
            width: 100%;
            padding: 0.5rem;
            font-size: 0.8125rem;
            background: transparent;
            color: #666;
            border: none;
            cursor: pointer;
            margin-top: 0.5rem;
        }

        .modal-box .btn-cancel:hover {
            color: #111;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="login-header">
            <img src="{% static 'images/logo.jpeg' %}" alt="IEA Logo">
            <h1>Cắt sắt IEA</h1>
            <p>Đăng nhập để tiếp tục</p>
        </div>

        {% if error_message %}
        <div class="alert alert-danger"><strong>Lỗi!</strong> {{ error_message }}</div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="username">Tên đăng nhập</label>
                <input type="text" id="username" name="username" placeholder="Nhập tên đăng nhập" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Mật khẩu</label>
                <input type="password" id="password" name="password" placeholder="Nhập mật khẩu" required>
            </div>
            <button type="submit" class="btn-login">Đăng nhập</button>
        </form>

        <p class="footer-text">© 2025 IEA</p>
    </div>

    {% if show_otp_modal %}
    <div class="modal-overlay">
        <div class="modal-box">
            <h2>Nhập mã xác thực</h2>
            <p>Liên hệ Admin để lấy mã</p>
            <input type="text" id="otpCode" class="otp-input" placeholder="000000" maxlength="6" autocomplete="off"
                inputmode="numeric">
            <p class="otp-error" id="otpError"></p>
            <button class="btn-verify" id="btnVerify" onclick="verifyOTP()">Xác nhận</button>
            <button class="btn-cancel" onclick="cancelLogin()">Hủy</button>
        </div>
    </div>
    <script>
        var verifyUrl = '{% url "accounts:verify_otp" %}';
        var loginUrl = '{% url "accounts:login" %}';
        var csrfToken = '{{ csrf_token }}';

        document.getElementById('otpCode').focus();
        document.getElementById('otpCode').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') verifyOTP();
        });

        function cancelLogin() {
            window.location.href = loginUrl;
        }

        function verifyOTP() {
            var code = document.getElementById('otpCode').value.trim();
            var btn = document.getElementById('btnVerify');
            var err = document.getElementById('otpError');
            if (!code) { err.textContent = 'Vui lòng nhập mã'; return; }
            btn.disabled = true; btn.textContent = '...'; err.textContent = '';

            fetch(verifyUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrfToken },
                body: JSON.stringify({ otp_code: code })
            })
                .then(function (r) { return r.json(); })
                .then(function (data) {
                    if (data.success) { window.location.href = data.redirect; }
                    else { err.textContent = data.error; btn.disabled = false; btn.textContent = 'Xác nhận'; document.getElementById('otpCode').value = ''; document.getElementById('otpCode').focus(); }
                })
                .catch(function () { err.textContent = 'Lỗi kết nối'; btn.disabled = false; btn.textContent = 'Xác nhận'; });
        }
    </script>
    {% endif %}
</body>

</html>
