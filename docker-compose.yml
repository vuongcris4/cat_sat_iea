# ============================================
# Cat Sat IEA - Docker Compose Production
# ============================================
# Usage:
#   Build & Run:  docker-compose up -d --build
#   View logs:    docker-compose logs -f
#   Stop:         docker-compose down
#   Rebuild:      docker-compose up -d --build
# ============================================

services:
  # Redis for Django Channels (WebSocket)
  redis:
    image: redis:7-alpine
    container_name: catsat_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - catsat_network

  # Django Application
  web:
    build: .
    container_name: catsat_web
    restart: unless-stopped
    ports:
      - "18080:8000"  # Host:Container (expose on unusual port)
    environment:
      - DJANGO_SETTINGS_MODULE=iea_project.settings
      - REDIS_HOST=redis
      - DEBUG=False
    volumes:
      # Persist data outside container
      - ./data/patterns_cache:/app/patterns_cache
      - ./data/db.sqlite3:/app/db.sqlite3
      - ./data/logs:/app/logs  # Persistent logs
    depends_on:
      - redis
    networks:
      - catsat_network

  # Cloudflare Tunnel (optional - uncomment to enable)
  # cloudflared:
  #   image: cloudflare/cloudflared:latest
  #   container_name: catsat_tunnel
  #   restart: unless-stopped
  #   command: tunnel run
  #   environment:
  #     - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
  #   networks:
  #     - catsat_network

networks:
  catsat_network:
    driver: bridge

volumes:
  redis_data:
