services:
  postgres:
    image: postgres:16-alpine
    container_name: catsat_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-catsat}
      POSTGRES_USER: ${DB_USER:-catsat}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-catsat_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - catsat_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-catsat}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: catsat_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - catsat_network

  web:
    build: .
    container_name: catsat_web
    restart: unless-stopped
    environment:
      - DJANGO_SETTINGS_MODULE=iea_project.settings
      - SECRET_KEY=${SECRET_KEY:-django-insecure-dev-key}
      - DEBUG=${DEBUG:-False}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-*}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS:-}
      - DB_NAME=${DB_NAME:-catsat}
      - DB_USER=${DB_USER:-catsat}
      - DB_PASSWORD=${DB_PASSWORD:-catsat_secret}
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_HOST=redis
    volumes:
      - ./data/patterns_cache:/app/patterns_cache
      - ./data/logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - catsat_network

  caddy:
    image: caddy:2-alpine
    container_name: catsat_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
    networks:
      - catsat_network

networks:
  catsat_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
